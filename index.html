<!doctype html>
<html lang="eng">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-status-bar" content="black">
  <meta name="theme-color" content="black">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="stylesheet" type="text/css" href="css/styles.css">

  <title>Peter's PWA Assignment</title>

<script src="js/main.js"></script>
<script src="js/helper.js"></script>
<script src="controller/mainController.js"></script>
<script src="view/mainView.js"></script>

<script>

  const Controller = new mainController()
  const View = new mainView()

  document.addEventListener('DOMContentLoaded', () => {

    document.getElementById('selectedPage').addEventListener('click', () => {
      let selectedPage = document.getElementById('page').value
      Controller.selectedPage(selectedPage)
    })

    Controller.init()
  })

</script>

<body>

  <div id="content-container">
    <div id="header">
      <div id="head-title">
        <h1>MY PWA ASSIGNMENT V1</h1>
      </div>
      <div id="nav">
        <label>Choose page: </label>
        <select id="page">
          <option value="main">Start page</option>
          <option value="gallery">Gallery</option>
        </select>
        <button id="selectedPage">OK</button>
      </div>
    </div>
      

    <div id="main" class="content">
    </div>

    <div id="footer">
      <p>Made by Peter Sillén, student in JavaScriptutveckling at EC Utbildning</p>
    </div>
  </div>

</body>
</html>
